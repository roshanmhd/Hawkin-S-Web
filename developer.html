<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Settings - Hawkin's Web</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .settings-content {
            padding: 40px;
        }

        .admin-form-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 30px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto 30px auto;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .admin-form h3 {
            margin-bottom: 25px;
            font-size: 20px;
            color: var(--primary-blue);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--secondary-blue), var(--primary-blue));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            box-shadow: 0 0 20px var(--glow-spread);
            transform: scale(1.02);
        }

        #dashboardSection {
            display: none;
        }

        .auth-message {
            text-align: center;
            margin-top: 15px;
            color: #ff4d4d;
            font-size: 14px;
            display: none;
        }

        /* Custom App List Styling */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .custom-app-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .custom-app-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .custom-app-icon {
            font-size: 24px;
            color: var(--primary-blue);
        }

        .custom-app-details h4 {
            margin: 0 0 5px 0;
            color: var(--text-main);
        }

        .custom-app-details p {
            margin: 0;
            font-size: 12px;
            color: var(--text-muted);
        }

        .custom-app-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn.edit-btn:hover {
            background: var(--primary-blue);
            border-color: var(--primary-blue);
        }

        .action-btn.del-btn:hover {
            background: #e74c3c;
            border-color: #e74c3c;
            color: white;
        }

        /* Accordion Styles */
        .settings-accordion-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-accordion-header h3 {
            margin-bottom: 0;
            flex: 1;
            justify-content: flex-start;
            margin-right: 15px;
            /* ensure gap before toggle icon */
        }

        .settings-accordion-header .toggle-icon {
            color: var(--text-muted);
            transition: transform 0.3s ease;
            font-size: 18px;
        }

        .accordion-content {
            display: none;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .admin-form-container.open .accordion-content {
            display: block;
            animation: fadeIn 0.3s ease forwards;
        }

        .admin-form-container.open .settings-accordion-header .toggle-icon {
            transform: rotate(180deg);
            color: var(--primary-blue);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <!-- Theme loading script to prevent flicker -->
    <script>
        if (localStorage.getItem('hawkinsTheme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>

<body>
    <!-- Background Effects -->
    <div class="bg-glow blue-glow-1"></div>
    <div class="bg-glow blue-glow-2"></div>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">HAWKIN'S <span>WEB</span></h1>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu">
                <a href="index.html" class="menu-item">
                    <i class="fas fa-qrcode"></i> Dashboard
                </a>
                <a href="index.html" class="menu-item">
                    <i class="fas fa-mobile-alt"></i> Apps
                </a>
                <a href="index.html" class="menu-item">
                    <i class="fas fa-globe"></i> Websites
                </a>
                <div class="sidebar-divider"></div>
                <a href="index.html" class="menu-item">
                    <i class="fas fa-heart"></i> Favorites
                </a>
                <a href="settings.html" class="menu-item active">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="navbar">
                <div class="nav-container">
                    <h2 style="margin: 0; font-size: 22px;">Developer Panel</h2>
                </div>
            </header>

            <main class="main-content settings-content">
                <div class="settings-grid">

                    <!-- Authentication Section -->
                    <div class="admin-form-container" id="authSection">
                        <div class="admin-form">
                            <h3><i class="fas fa-lock"></i> Developer Login</h3>
                            <p
                                style="text-align: left; color: var(--text-muted); margin-bottom: 20px; font-size: 14px;">
                                Enter developer password to access internal content management tools.</p>

                            <div class="form-group">
                                <label for="devPassword">Password</label>
                                <input type="password" id="devPassword" placeholder="Enter password">
                            </div>
                            <button class="submit-btn" id="loginBtn">Authenticate <i
                                    class="fas fa-arrow-right"></i></button>
                            <div class="auth-message" id="authMessage">Incorrect password!</div>
                        </div>
                    </div>

                    <!-- Developer Dashboard (Hidden until auth) -->
                    <div id="dashboardSection">
                        <!-- Manage Existing Projects -->
                        <div class="admin-form-container">
                            <div class="admin-form">
                                <div class="settings-accordion-header"
                                    onclick="this.parentElement.parentElement.classList.toggle('open')">
                                    <h3><i class="fas fa-list"></i> Manage Custom Projects</h3>
                                    <i class="fas fa-chevron-down toggle-icon"></i>
                                </div>
                                <div class="accordion-content">
                                    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">Edit or
                                        delete any projects you have manually added.</p>
                                    <div class="project-list" id="customProjectList">
                                        <!-- Populated by JS -->
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Add/Edit Project Section -->
                        <div class="admin-form-container">
                            <div class="admin-form">
                                <div class="settings-accordion-header"
                                    onclick="this.parentElement.parentElement.classList.toggle('open')">
                                    <h3 id="formTitle"><i class="fas fa-plus-circle"></i> Add New Project</h3>
                                    <i class="fas fa-chevron-down toggle-icon"></i>
                                </div>
                                <div class="accordion-content">
                                    <form id="addProjectForm">
                                        <input type="hidden" id="editProjectId" value="">

                                        <div class="form-group">
                                            <label for="projType">Project Type</label>
                                            <select id="projType" required>
                                                <option value="app">App</option>
                                                <option value="web">Website</option>
                                            </select>
                                        </div>

                                        <div class="form-group">
                                            <label for="projTitle">Title</label>
                                            <input type="text" id="projTitle" required
                                                placeholder="e.g. My Awesome App">
                                        </div>

                                        <div class="form-group">
                                            <label for="projCategory">Category</label>
                                            <input type="text" id="projCategory" required
                                                placeholder="e.g. Utility, Game">
                                        </div>

                                        <div class="form-group">
                                            <label for="projDesc">Description</label>
                                            <textarea id="projDesc" required
                                                placeholder="Short description..."></textarea>
                                        </div>

                                        <div class="form-group">
                                            <label for="projIcon">Icon (FontAwesome Class)</label>
                                            <input type="text" id="projIcon" required
                                                placeholder="e.g. fa-star, fa-gamepad">
                                        </div>

                                        <div class="form-group">
                                            <label for="projVersion">Version</label>
                                            <input type="text" id="projVersion" required placeholder="e.g. v1.0.0">
                                        </div>

                                        <div class="form-group" id="sizeGroup">
                                            <label for="projSize">Size</label>
                                            <input type="text" id="projSize" placeholder="e.g. 50 MB">
                                        </div>

                                        <div class="form-group">
                                            <label for="projLink">Link / Download Link</label>
                                            <input type="text" id="projLink" required placeholder="URL or link #">
                                        </div>

                                        <div style="display: flex; gap: 15px;">
                                            <button type="submit" class="submit-btn" id="submitProjectBtn">Add to
                                                Dashboard</button>
                                            <button type="button" class="submit-btn" id="cancelEditBtn"
                                                style="display: none; background: transparent; border: 1px solid var(--border-color); color: var(--text-main);">Cancel</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Back to Settings btn -->
                    <a href="settings.html"
                        style="color: var(--text-muted); text-decoration: none; margin-top: 10px; display: inline-block;">
                        <i class="fas fa-arrow-left"></i> Back to Settings
                    </a>

                </div>
            </main>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="developer.js"></script>
</body>

</html>
