<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Hawkin's Web</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .settings-content {
            padding: 40px;
        }

        .admin-form-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 30px;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .admin-form-container.open {
            padding-bottom: 25px;
        }

        .admin-form h3 {
            margin-bottom: 0;
            font-size: 18px;
            color: var(--primary-blue);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--secondary-blue), var(--primary-blue));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            box-shadow: 0 0 20px var(--glow-spread);
            transform: scale(1.02);
        }

        #addAppSection {
            display: none;
        }

        .auth-message {
            text-align: center;
            margin-top: 15px;
            color: #ff4d4d;
            font-size: 14px;
            display: none;
        }

        .settings-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .theme-options {
            display: flex;
            gap: 15px;
        }

        .theme-btn {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-main);
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .theme-btn i {
            margin-right: 8px;
        }

        .theme-btn:hover {
            border-color: var(--primary-blue);
        }

        .theme-btn.active {
            background: linear-gradient(135deg, var(--secondary-blue), var(--primary-blue));
            color: #fff;
            border-color: transparent;
        }

        /* Accordion Styles */
        .settings-accordion-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-accordion-header h3 {
            margin-bottom: 0;
            flex: 1;
            justify-content: flex-start;
        }

        .settings-accordion-header .toggle-icon {
            color: var(--text-muted);
            transition: transform 0.3s ease;
            font-size: 18px;
        }

        .accordion-content {
            display: none;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .admin-form-container.open .accordion-content {
            display: block;
            animation: fadeIn 0.3s ease forwards;
        }

        .admin-form-container.open .settings-accordion-header .toggle-icon {
            transform: rotate(180deg);
            color: var(--primary-blue);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <!-- Theme loading script to prevent flicker -->
    <script>
        if (localStorage.getItem('hawkinsTheme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>

<body>
    <!-- Background Effects -->
    <div class="bg-glow blue-glow-1"></div>
    <div class="bg-glow blue-glow-2"></div>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">HAWKIN'S <span>WEB</span></h1>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu">
                <a href="index.html" class="menu-item">
                    <i class="fas fa-qrcode"></i> Dashboard
                </a>
                <a href="index.html" class="menu-item">
                    <i class="fas fa-mobile-alt"></i> Apps
                </a>
                <a href="index.html" class="menu-item">
                    <i class="fas fa-globe"></i> Websites
                </a>
                <div class="sidebar-divider"></div>
                <a href="#" class="menu-item">
                    <i class="fas fa-heart"></i> Favorites
                </a>
                <a href="settings.html" class="menu-item active">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="navbar">
                <div class="nav-container">
                    <h2 style="margin: 0; font-size: 22px;">Settings / Developer Panel</h2>
                </div>
            </header>

            <main class="main-content settings-content">
                <div class="settings-grid">

                    <!-- Appearance Section -->
                    <div class="admin-form-container">
                        <div class="admin-form">
                            <div class="settings-accordion-header"
                                onclick="this.parentElement.parentElement.classList.toggle('open')">
                                <h3><i class="fas fa-paint-brush"></i> Appearance Mode</h3>
                                <i class="fas fa-chevron-down toggle-icon"></i>
                            </div>
                            <div class="accordion-content">
                                <div class="theme-options">
                                    <button id="themeDarkBtn" class="theme-btn active"><i class="fas fa-moon"></i> Dark
                                        Mode</button>
                                    <button id="themeLightBtn" class="theme-btn"><i class="fas fa-sun"></i> White
                                        Mode</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Data Management Section -->
                    <div class="admin-form-container">
                        <div class="admin-form">
                            <div class="settings-accordion-header"
                                onclick="this.parentElement.parentElement.classList.toggle('open')">
                                <h3><i class="fas fa-database"></i> Data Management</h3>
                                <i class="fas fa-chevron-down toggle-icon"></i>
                            </div>
                            <div class="accordion-content">
                                <p
                                    style="text-align: center; color: var(--text-muted); margin-bottom: 20px; font-size: 12px;">
                                    Clear local browser data such as your favorites or added apps.</p>
                                <div style="display: flex; flex-direction: column; gap: 15px;">
                                    <button id="clearFavsBtn" class="submit-btn"
                                        style="background: transparent; border: 1px solid var(--border-color); color: var(--text-main);"><i
                                            class="fas fa-heart-broken"></i> Clear Favorites</button>
                                    <button id="clearAppsBtn" class="submit-btn"
                                        style="background: linear-gradient(135deg, #e74c3c, #c0392b);"><i
                                            class="fas fa-trash-alt"></i> Delete Added Projects</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Support & Contact -->
                    <div class="admin-form-container">
                        <div class="admin-form">
                            <div class="settings-accordion-header"
                                onclick="this.parentElement.parentElement.classList.toggle('open')">
                                <h3><i class="fas fa-life-ring"></i> Support</h3>
                                <i class="fas fa-chevron-down toggle-icon"></i>
                            </div>
                            <div class="accordion-content">
                                <div style="display: flex; flex-direction: column; gap: 15px;">
                                    <button id="contactBtn" class="submit-btn"><i class="fas fa-envelope"></i> Contact
                                        Developer</button>
                                    <button id="reportBtn" class="submit-btn"
                                        style="background: transparent; border: 1px solid var(--border-color); color: var(--text-main);"><i
                                            class="fas fa-bug"></i> Report Issue</button>
                                </div>
                            </div>
                        </div>
                    </div>


            </main>
        </div>
    </div>

    <script src="settings.js"></script>
</body>

</html>
